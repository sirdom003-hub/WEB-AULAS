        <form action="#" method="post" class="contato-form">

                <legend>Dados Pessoais</legend>
                <p class="p-form">
                <label for="nome">Nome</label><br>
                <input type="text" id="nome" name="nome" maxlength="60" placeholder="Seu nome completo" required>

                <p class="p-form">
                <label for="email">E-mail</label><br>
                <input type="email" id="email" name="email" maxlength="30" placeholder="exemplo@email.com" required>
                </p>

                <p class="p-form">
                <label for="mensagem">Mensagen</label>
                <textarea id="mensagem" name="mensagem" rows="6" required></textarea>
                </p>

                <button type="submit">ENVIAR</button>

            </fieldset>
        </form>
