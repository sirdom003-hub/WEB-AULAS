<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EVE</title>

    <body>
        
        <header>
            <nav id="menu">
                <ul>
                    <li><a href="index.html">EVE</a></li>
                    <li><a href="list.html">EVENTOS</a></li>
                    <li><a href="form.html">CONTATO</a></li>
                </ul>
            </nav>
            <h1 id="hm">EVE <span>:)</span></h1>
        </header>

        <form>
            <fieldset>
                <legend>Dados Pessoais</legend>
                <p>
                <label for="nome">Nome Completo:</label><br>
                <input type="text" id="nome" name="nome" maxlength="60" placeholder="Seu nome completo" required>
                </p>
                
                <p>
                <label for="email">E-mail:</label><br>
                <input type="email" id="email" name="email" maxlength="30" placeholder="exemplo@email.com" required>
                </p>

                <p>
                <label for="telefone">Telefone:</label><br>
                <input type="tel" id="telefone" name="telefone" maxlength="15" placeholder="(00) 00000-0000" required>
                </p>

                <p>
                <label for="nascimento">Data de Nascimento:</label><br>
                <input type="date" id="nascimento" name="nascimento" required>
                </p>
            </fieldset>

        <footer>

        </footer>
    </body>
</html>
